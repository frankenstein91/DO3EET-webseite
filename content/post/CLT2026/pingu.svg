<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="100%" height="100%">
    <defs>
        <!-- Das Raster-Muster erzeugt die typischen Lücken zwischen den LCD-Pixeln -->
        <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
            <rect width="10" height="10" fill="none" stroke="#b0b4b0" stroke-width="2" shape-rendering="crispEdges"/>
        </pattern>
        
        <!-- Ein leichter Verlauf für den Glas-Glanz des Displays -->
        <linearGradient id="glare" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
            <stop offset="40%" stop-color="#ffffff" stop-opacity="0.0" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.2" />
        </linearGradient>
    </defs>

    <!-- Äußeres Gehäuse / Bezel -->
    <rect width="360" height="360" rx="12" fill="#1e1e1e" />

    <!-- Innerer Bezel Schatten -->
    <rect x="15" y="15" width="330" height="330" rx="6" fill="#0a0a0a" />

    <!-- LCD Hintergrund (Pixel im "Aus"-Zustand) -->
    <rect x="20" y="20" width="320" height="320" fill="#d0d4d0" shape-rendering="crispEdges" />

    <!-- Pixel im "An"-Zustand (Tux) -->
    <g transform="translate(20,20)" fill="#181a18" shape-rendering="crispEdges">
        <!-- Kopf -->
        <rect x="140" y="10" width="40" height="10" />
        <rect x="110" y="20" width="100" height="10" />
        <rect x="90" y="30" width="140" height="10" />
        
        <!-- Augenbereich (oben) -->
        <rect x="80" y="40" width="20" height="10" />
        <rect x="150" y="40" width="20" height="10" />
        <rect x="220" y="40" width="20" height="10" />
        
        <!-- Augen mit Pupillen -->
        <rect x="80" y="50" width="20" height="10" />
        <rect x="120" y="50" width="20" height="10" />
        <rect x="150" y="50" width="20" height="10" />
        <rect x="180" y="50" width="20" height="10" />
        <rect x="220" y="50" width="20" height="10" />
        
        <rect x="80" y="60" width="20" height="10" />
        <rect x="120" y="60" width="20" height="10" />
        <rect x="150" y="60" width="20" height="10" />
        <rect x="180" y="60" width="20" height="10" />
        <rect x="220" y="60" width="20" height="10" />
        
        <!-- Augenbereich (unten) -->
        <rect x="80" y="70" width="20" height="10" />
        <rect x="150" y="70" width="20" height="10" />
        <rect x="220" y="70" width="20" height="10" />
        
        <!-- Wangen -->
        <rect x="90" y="80" width="140" height="10" />
        <rect x="100" y="90" width="120" height="10" />
        
        <!-- Schnabel -->
        <rect x="90" y="100" width="140" height="10" />
        <rect x="80" y="110" width="20" height="10" />
        <rect x="220" y="110" width="20" height="10" />
        <rect x="70" y="120" width="20" height="10" />
        <rect x="110" y="120" width="100" height="10" />
        <rect x="230" y="120" width="20" height="10" />
        <rect x="80" y="130" width="20" height="10" />
        <rect x="220" y="130" width="20" height="10" />
        <rect x="90" y="140" width="140" height="10" />
        
        <!-- Hals und Schultern -->
        <rect x="70" y="150" width="180" height="10" />
        <rect x="50" y="160" width="220" height="10" />
        
        <!-- Körper (Schwarze Seiten, weißer Bauch) -->
        <rect x="40" y="170" width="60" height="10" />
        <rect x="220" y="170" width="60" height="10" />
        
        <rect x="30" y="180" width="60" height="10" />
        <rect x="230" y="180" width="60" height="10" />
        
        <rect x="20" y="190" width="60" height="10" />
        <rect x="240" y="190" width="60" height="10" />
        
        <!-- Mittelteil des Körpers (vertikal zusammengefasst) -->
        <rect x="10" y="200" width="60" height="40" />
        <rect x="250" y="200" width="60" height="40" />
        
        <!-- Körper verjüngt sich nach unten -->
        <rect x="20" y="240" width="60" height="10" />
        <rect x="240" y="240" width="60" height="10" />
        
        <rect x="30" y="250" width="60" height="10" />
        <rect x="230" y="250" width="60" height="10" />
        
        <rect x="40" y="260" width="60" height="10" />
        <rect x="220" y="260" width="60" height="10" />
        
        <rect x="50" y="270" width="60" height="10" />
        <rect x="210" y="270" width="60" height="10" />
        
        <!-- Unterer Körper -->
        <rect x="60" y="280" width="200" height="10" />
        
        <!-- Füße -->
        <rect x="40" y="290" width="40" height="10" />
        <rect x="240" y="290" width="40" height="10" />
        
        <rect x="20" y="300" width="30" height="10" />
        <rect x="70" y="300" width="30" height="10" />
        <rect x="220" y="300" width="30" height="10" />
        <rect x="270" y="300" width="30" height="10" />
        
        <rect x="10" y="310" width="100" height="10" />
        <rect x="210" y="310" width="100" height="10" />
    </g>

    <!-- Raster-Überlagerung: "Schneidet" die Lücken in die soliden Farbblöcke -->
    <rect x="20" y="20" width="320" height="320" fill="url(#grid)" pointer-events="none" />

    <!-- Schriftzug am unteren Bildschirmrand -->
    <text x="180" y="353" font-family="monospace, sans-serif" font-weight="bold" font-size="9" fill="#555555" text-anchor="middle" letter-spacing="2">S/W MATRIX LCD</text>

    <!-- Glas-Glanz Überlagerung -->
    <rect width="360" height="360" rx="12" fill="url(#glare)" pointer-events="none" />
</svg>
