<style>
#ark-of-truth {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 280px;
    background: #1a1b26;
    border: 2px solid #e0af68;
    border-radius: 8px;
    padding: 15px;
    color: var(--fg-color);
    font-family: var(--font-monospace);
    box-shadow: 0 0 20px rgba(224, 175, 104, 0.3);
    z-index: 9998;
    
    /* Animation-Setup */
    opacity: 0;
    pointer-events: none;
    transform: translateY(100px);
    transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    
    display: flex;
    align-items: center;
    gap: 15px;
}

#ark-of-truth.revealed {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
}

#ark-of-truth .icon {
    font-size: 2rem;
    color: #e0af68;
    text-shadow: 0 0 10px rgba(224, 175, 104, 0.5);
}

#ark-of-truth .text-content {
    flex: 1;
}

#ark-of-truth .title {
    margin: 0;
    font-size: 0.9rem;
    color: #e0af68;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#ark-of-truth p {
    margin: 5px 0 0 0;
    font-size: 0.8rem;
    line-height: 1.2;
}

#ark-of-truth .ark-subtext {
    display: block;
    font-size: 0.7rem;
    color: #566f56;
    font-style: italic;
    margin-top: 2px;
}

.close-ark {
    position: absolute;
    top: 5px;
    right: 5px;
    cursor: pointer;
    font-size: 0.7rem;
    color: #566f56;
}

.close-ark:hover {
    color: var(--fg-color);
}
</style>

<div id="ark-of-truth">
    <div class="close-ark" onclick="this.parentElement.classList.remove('revealed')">×</div>
    <div class="icon">🛸</div>
    <div class="text-content">
        <div class="title">The Ark of Truth</div>
        <p>Die Quelle der Wahrheit<br><span class="ark-subtext">Hallowed are the Ori.</span></p>
    </div>
</div>

<script>
(function() {
    window.addEventListener('scroll', function() {
        const ark = document.getElementById('ark-of-truth');
        if (!ark || ark.classList.contains('revealed')) return;

        // Prüfen, ob wir am Ende der Seite sind
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 10) {
            ark.classList.add('revealed');
            console.log("Origin is the source of truth.");
        }
    });
})();
</script>
