<style>
#ark-of-truth {
    opacity: 0;
    text-align: center;
    margin: 40px 0 20px 0;
    transition: opacity 2s ease-in-out;
    font-family: var(--font-monospace);
}

#ark-of-truth.revealed {
    opacity: 1;
}

.ark-content {
    display: inline-block;
    padding: 10px 20px;
    border: 1px solid #e0af68;
    color: #e0af68;
    text-shadow: 0 0 15px rgba(224, 175, 104, 0.8);
    box-shadow: inset 0 0 15px rgba(224, 175, 104, 0.2), 0 0 15px rgba(224, 175, 104, 0.2);
    border-radius: 4px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: bold;
    cursor: default;
    user-select: none;
}

.ark-subtext {
    display: block;
    font-size: 0.7rem;
    margin-top: 8px;
    color: #565f89;
    letter-spacing: 1px;
    text-transform: none;
}
</style>

<div id="ark-of-truth">
    <div class="ark-content">
        The Ark of Truth
        <span class="ark-subtext">Die Quelle der Wahrheit (2008)</span>
    </div>
</div>

<script>
(function() {
    window.addEventListener('scroll', function() {
        const ark = document.getElementById('ark-of-truth');
        if (!ark || ark.classList.contains('revealed')) return;

        // Prüfen, ob wir am Ende der Seite sind
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 10) {
            ark.classList.add('revealed');
            console.log("Origin is the source of truth.");
        }
    });
})();
</script>
