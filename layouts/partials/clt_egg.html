<style>
#linux-egg-achievement {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 480px;
    background: #1a1b26;
    border: 2px solid var(--accent-color);
    border-radius: 8px;
    padding: 20px;
    color: var(--fg-color);
    font-family: var(--font-monospace);
    box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
    z-index: 9999;
    
    display: none;
    opacity: 0;
    pointer-events: none;
    transform: translateY(100px);
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#linux-egg-achievement.show {
    display: flex;
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
    align-items: center;
    gap: 20px;
}

#linux-egg-achievement .icon {
    flex-shrink: 0;
}

@media (max-width: 600px) {
    #linux-egg-achievement {
        width: calc(100% - 40px);
        flex-direction: column;
        text-align: center;
        padding: 15px;
    }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const eggs = document.querySelectorAll('.linux-egg');
    const achievement = document.getElementById('linux-egg-achievement');
    if (eggs.length > 0 && achievement) {
        eggs.forEach(egg => {
            egg.addEventListener('click', function() {
                achievement.classList.add('show');
                console.log("Achievement: Lang verschollenen Tux gefunden!");
            });
        });
    }
});
</script>
